; Velocity Sensor — firmware for the dual-comparator optical droplet velocity sensor.
; Target: Arduino Zero (Atmel SAMD21G18A, Cortex-M0+).
; https://docs.platformio.org/page/projectconf.html

[env:zero]
platform = atmelsam
board = zero
framework = arduino
monitor_speed = 38400

; Host-side unit tests for the time-of-flight state machine (VelSensor).
; VelSensor.{h,cpp} depend on no Arduino headers, so they build and run natively.
; main.cpp is excluded here because it is Arduino-only.
[env:native]
platform = native
build_src_filter = +<*> -<main.cpp>
build_flags = -I src
test_framework = unity
test_build_src = yes
